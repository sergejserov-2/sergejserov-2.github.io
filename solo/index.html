<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <title>Соло режим - играть</title>

    <meta name="theme-color" content="#6e45e2">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="../img/favicon.png">
    <link rel="stylesheet" href="main.css">
</head>

<body>

<div class="game">

    <!-- =====================================================
        1. LOBBY (ESTIMATOR)
    ====================================================== -->
    <div class="lobby estimator">

        <div class="gamerule-selector">
            <h2>Правила</h2>

            <form>
                <div class="radio-picker">
                    <p>Количество раундов</p>

                    <input type="radio" name="round-count" value="1" id="1round">
                    <label for="1round">1</label>

                    <input type="radio" name="round-count" value="2" id="2round">
                    <label for="2round">2</label>

                    <input type="radio" name="round-count" value="3" id="3round">
                    <label for="3round">3</label>

                    <input type="radio" name="round-count" value="4" id="4round">
                    <label for="4round">4</label>

                    <input type="radio" name="round-count" value="5" id="5round" checked>
                    <label for="5round">5</label>
                </div>

                <label>
                    <p>Лимит времени</p>
                    <p class="hint">-1 = неограничено</p>
                    <input type="number" name="time-limit" value="-1">
                    <span>секунд</span>
                </label>

                <label>
                    <p>Кол-во шагов</p>
                    <p class="hint">-1 = неограничено</p>
                    <input type="number" name="move-limit" value="-1">
                    <span>шагов</span>
                </label>

                <div class="radio-picker pan-radio">
                    <p>Увеличение и осмотр</p>

                    <input type="checkbox" id="pan" checked>
                    <label for="pan">Осмотр</label>

                    <input type="checkbox" id="zoom" checked>
                    <label for="zoom">Увеличение</label>
                </div>

                <input type="submit" id="playBtn" value="Начать игру">
            </form>
        </div>

    </div>

    <!-- =====================================================
        2. LOADING SCREEN (NEW)
    ====================================================== -->
    <div class="loading-screen" style="display:none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка локации...</div>
        </div>
    </div>

    <!-- =====================================================
        3. GAME SCENE
    ====================================================== -->

    <div class="game-scene">

        <!-- STREETVIEW -->
        <div class="streetview"></div>

        <!-- MAP -->
        <div class="map-element"></div>

        <div class="embed-map"></div>
        <div class="overview-map"></div>

        <!-- HUD -->
        <div class="info-view">
            <div class="round">Раунд: <b>0/0</b></div>
            <div class="total-score">Счёт: <b>0</b></div>
            <div class="time-left">Время: <b>0</b></div>
            <div class="moves-left">Шагов: <b>0</b></div>
        </div>

        <!-- GUESS CONTROLS -->
        <div class="guess-map">
            <div class="toggle-map-overlay" id="mapOverlay"></div>
            <div class="guess-map-resizer"></div>
            <div class="embed-map"></div>

            <div class="guess-button" id="makeGuess">
                Сделать выбор
            </div>
        </div>

    </div>

    <!-- =====================================================
        4. RESULT SCREEN
    ====================================================== -->
<div class="guess-overview" style="transform: translateY(100%);">

        <div class="score-view">

            <div class="score-progress-bar">
                <div class="score-progress"></div>
            </div>

            <div class="score-text">
                <p></p>
                <p></p>
            </div>

            <div class="button next-round-button">Далее</div>

            <div class="game-end-buttons">

                <form class="high-score-form">
                    <p>Submit to scoreboard</p>

                    <input class="username-input"
                           placeholder="Имя игрока"
                           required
                           minlength="3">

                    <input type="submit" value="Submit">
                </form>

                <div class="button play-again-button">Играть снова</div>
                <div class="button home-button">Выбрать режим</div>

            </div>

        </div>
    </div>

</div>

<script type="module" src="../Init.js"></script>

<script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJfRzZ-GGIV3iCrCVkTsYKDNh09kenzNM&libraries=geometry">
</script>

</body>
</html>
