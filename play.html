<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<title>Geo Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="play.css">
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />


</head>

<body>
<div class="game">

    <!-- SCREENS -->
    <div class="screens">

        <div class="loading-screen">
            Загрузка...
        </div>

<div class="waiting-screen guess-overview">
    <div class="score-view">

        <div class="score-text">
            Ожидание игроков...
        </div>

        <div class="round-timer-bar"></div>

    </div>
</div>

<div class="round-result guess-overview">
    <div class="score-view">

        <div class="overview-map"></div>

        <div class="players-score"></div>

        <div class="round-timer-bar"></div>

    </div>
</div>

<div class="game-result guess-overview">
    <div class="score-view">

        <div class="overview-map"></div>

        <div class="players-score"></div>

        <div class="game-end-buttons">
            <div class="button play-again-button">Играть снова</div>
            <div class="button home-button">В меню</div>
        </div>

    </div>
</div>

    </div>

    <!-- GAME SCENE -->
    <div class="game-scene">

        <div class="streetview"></div>

        <div class="hud-wrapper">
            <div class="hud">
                <div class="round"><b></b></div>
                <div class="total-score"><b></b></div>
                <div class="time-left"><b></b></div>
                <div class="moves-left"><b></b></div>
            </div>
        </div>

        <div class="map-wrapper">
            <div class="map"></div>

            <div class="resize-handle"></div>

            <div class="polygon-button" id="togglePolygon">
                Показать область
            </div>

            <div class="guess-button" id="makeGuess">
                Сделать выбор
            </div>
        </div>

    </div>
</div>


<script type="module">
  const url = new URL(window.location.href);

  const roomId = url.searchParams.get("room");
  const mode = roomId ? "duel" : "solo";

  // пробрасываем глобально до Init.js
  window.__GAME_BOOT = {
    mode,
    roomId
  };
</script>
<script type="module" src="./Init.js"></script>

<!-- Google Maps (StreetView остаётся) -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJfRzZ-GGIV3iCrCVkTsYKDNh09kenzNM&libraries=geometry"></script>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
</body>
</html>
