<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<title>Geo Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="play.css">
</head>

<body>

<div class="game">

    <!-- =========================
        SCREENS
    ========================== -->
    <div class="screens">

        <!-- LOADING -->
        <div class="loading-screen">
            Загрузка...
        </div>

        <!-- RESULT -->
        <div class="guess-overview">
            <div class="score-view">
                <div class="overview-map"></div>
                <div class="score-progress-bar">
                    <div class="score-progress"></div>
                </div>
                <div class="score-text">
                    <p></p>
                    <p></p>
                </div>
                <div class="game-end-buttons">
                    <div class="button play-again-button">Играть снова</div>
                    <div class="button home-button">В меню</div>
                </div>
            </div>
        </div>
    </div>

    <!-- =========================
        GAME SCENE
    ========================== -->
    <div class="game-scene">

        <!-- STREETVIEW -->
        <div class="streetview"></div>

        <!-- HUD -->
        <div class="info-view">
            <div class="round">Раунд: <b>0/0</b></div>
            <div class="total-score">Счёт: <b>0</b></div>
            <div class="time-left">Время: <b>0</b></div>
            <div class="moves-left">Шагов: <b>0</b></div>
        </div>

        <!-- GUESS -->
        <div class="guess-map">
            <div class="embed-map"></div>
            <div class="resize-handle"></div>
            <div class="guess-button" id="makeGuess">
                Сделать выбор
            </div>
        </div>

    </div>

</div>

<!-- BOOTSTRAP -->
<script type="module" src="../Init.js"></script>

<!-- GOOGLE MAPS -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJfRzZ-GGIV3iCrCVkTsYKDNh09kenzNM&libraries=geometry"></script>

</body>
</html>
