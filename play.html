<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<title>Geo Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="main.css">

<style>
/* ===== BASIC RESET ===== */
body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* ===== SCREENS LAYER ===== */
.screens {
    position: absolute;
    inset: 0;
    z-index: 20;
}

/* ===== LOADING ===== */
.loading-screen {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    color: white;
}

/* ===== RESULT ===== */
.guess-overview {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    transform: translateY(100%);
    transition: transform 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
}

.score-view {
    width: 420px;
    background: #161a22;
    padding: 20px;
    border-radius: 12px;
}

/* ===== GAME SCENE ===== */
.game-scene {
    position: absolute;
    inset: 0;
}

/* HUD */
.info-view {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 5;
}

/* MAP + STREETVIEW */
.streetview,
.map-element {
    position: absolute;
    inset: 0;
}

/* GUESS UI */
.guess-map {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    z-index: 5;
}

.embed-map {
    width: 100%;
    height: 100%;
}

.guess-button {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #4ea1ff;
    padding: 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="game">

    <!-- =========================
        SCREENS
    ========================== -->
    <div class="screens">

        <!-- LOADING -->
        <div class="loading-screen">
            Загрузка...
        </div>

        <!-- RESULT -->
        <div class="guess-overview">

            <div class="score-view">

                <div class="score-progress-bar">
                    <div class="score-progress"></div>
                </div>

                <div class="score-text">
                    <p></p>
                    <p></p>
                </div>

                <div class="button next-round-button">Далее</div>

                <div class="game-end-buttons">

                    <form class="high-score-form">
                        <p>Submit to scoreboard</p>

                        <input class="username-input"
                               placeholder="Имя игрока"
                               required
                               minlength="3">

                        <input type="submit" value="Submit">
                    </form>

                    <div class="button play-again-button">Играть снова</div>
                    <div class="button home-button">В меню</div>

                </div>

            </div>
        </div>

    </div>

    <!-- =========================
        GAME SCENE
    ========================== -->
    <div class="game-scene">

        <!-- STREETVIEW -->
        <div class="streetview"></div>

        <!-- MAP -->
        <div class="map-element"></div>

        <!-- HUD -->
        <div class="info-view">
            <div class="round">Раунд: <b>0/0</b></div>
            <div class="total-score">Счёт: <b>0</b></div>
            <div class="time-left">Время: <b>0</b></div>
            <div class="moves-left">Шагов: <b>0</b></div>
        </div>

        <!-- GUESS -->
        <div class="guess-map">

            <div class="embed-map"></div>

            <div class="guess-button" id="makeGuess">
                Сделать выбор
            </div>

        </div>

    </div>

</div>

<!-- BOOTSTRAP -->
<script type="module" src="../Init.js"></script>

<!-- GOOGLE MAPS -->
<script async defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&libraries=geometry">
</script>

</body>
</html>
