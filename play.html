<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<title>Geo Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="play.css">

<!-- =========================
     LEAFLET CSS
========================= -->
<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

</head>

<body>
<div class="game">

    <!-- SCREENS -->
    <div class="screens">

        <div class="loading-screen">
            Загрузка...
        </div>

        <!-- ROUND RESULT -->
        <div class="round-result guess-overview">
            <div class="score-view">
                <div class="overview-map"></div>

                <div class="score-progress-bar">
                    <div class="score-progress"></div>
                </div>

                <div class="score-text"></div>

                <div class="round-timer-bar"></div>
            </div>
        </div>

        <!-- GAME RESULT -->
        <div class="game-result guess-overview">
            <div class="score-view">
                <div class="overview-map"></div>

                <div class="score-progress-bar">
                    <div class="score-progress"></div>
                </div>

                <div class="score-text"></div>

                <div class="game-end-buttons">
                    <div class="button play-again-button">Играть снова</div>
                    <div class="button home-button">В меню</div>
                </div>
            </div>
        </div>

    </div>

    <!-- GAME SCENE -->
    <div class="game-scene">

        <div class="streetview"></div>

        <div class="hud-wrapper">
            <div class="hud">
                <div class="round"><b></b></div>
                <div class="total-score"><b></b></div>
                <div class="time-left"><b></b></div>
                <div class="moves-left"><b></b></div>
            </div>
        </div>

        <div class="map-wrapper">
            <div class="map"></div>

            <div class="resize-handle"></div>

            <div class="polygon-button" id="togglePolygon">
                Показать область
            </div>

            <div class="guess-button" id="makeGuess">
                Сделать выбор
            </div>
        </div>

    </div>
</div>

<script type="module" src="./Init.js"></script>

<!-- Google Maps (StreetView остаётся) -->
<script async defer
 src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJfRzZ-GGIV3iCrCVkTsYKDNh09kenzNM&libraries=geometry">
</script>

<!-- =========================
     LEAFLET JS
========================= -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
