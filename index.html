<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Geo Game</title>
    
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* =========================
   CONTAINER
========================= */

.box {
    width: 460px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    box-sizing: border-box;
}

h2 {
    margin: 0 0 16px;
    font-size: 20px;
}

/* =========================
   SECTION
========================= */

.section {
    margin-bottom: 16px;
}

.title {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 8px;
}

/* =========================
   ROW
========================= */

.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
}

.row input {
    flex: 1;
    min-width: 160px;
}

/* =========================
   BUTTONS
========================= */

.btn {
    padding: 8px 10px;
    background: #2a2f3a;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: 0.15s;
}

.btn:hover {
    background: #343b4a;
}

.btn.active {
    background: #4ea1ff;
}


.btn.wait,
.btn.disabled {
    pointer-events: none;
    cursor: not-allowed;
}
    
/* =========================
   ROUNDS
========================= */

#rounds {
    display: flex;
    width: 100%;
}

#rounds .btn {
    flex: 1;
    text-align: center;
}

/* =========================
   INPUTS
========================= */

input[type="number"],
input[type="text"] {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #2a2f3a;
    color: white;
    outline: none;
}

input:disabled {
    opacity: 0.4;
}

/* =========================
   INLINE
========================= */

.inline {
    display: flex;
    gap: 8px;
    align-items: center;
}

/* =========================
   MAP ROW
========================= */

.map-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

/* =========================
   START BUTTON
========================= */

.start {
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    background: #2ecc71;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.start:hover {
    background: #27ae60;
}

.start.wait {
    background: #f39c12;
    cursor: not-allowed;
}

.start.disabled {
    background: #555;
    cursor: not-allowed;
}
</style>

</head>

<body>

<div class="box">

    <h2>🌍 Geo Game</h2>

    <!-- MODE -->
    <div class="section">
        <div class="title">Режим</div>
        <div class="row">
            <div class="btn active" data-mode="solo">Соло</div>
            <div class="btn" data-mode="duel">Дуэль</div>

            <input id="duelLink" type="text" placeholder="" disabled />
        </div>
    </div>

    <!-- ROUNDS -->
    <div class="section">
        <div class="title">Раунды</div>
        <div class="row" id="rounds">
            <div class="btn" data-rounds="1">1</div>
            <div class="btn" data-rounds="2">2</div>
            <div class="btn" data-rounds="3">3</div>
            <div class="btn" data-rounds="4">4</div>
            <div class="btn active" data-rounds="5">5</div>
        </div>
    </div>

    <!-- TIMER -->
    <div class="section">
        <div class="title">Таймер</div>
        <div class="inline">
            <div class="btn active" id="timeOff">Нет</div>
            <div class="btn" id="timeOn">Установить</div>
            <input id="timeInput" type="number" value="300" disabled>
        </div>
    </div>

    <!-- MOVES -->
    <div class="section">
        <div class="title">Ходы</div>
        <div class="inline">
            <div class="btn active" id="movesOff">Нет</div>
            <div class="btn" id="movesOn">Установить</div>
            <input id="movesInput" type="number" value="10" disabled>
        </div>
    </div>
<!-- AREA -->
    <div class="section">
        <div class="title">Карта</div>
        <div class="map-row" id="areas">
            <div class="btn active" data-area="europe">Европа</div>
            <div class="btn" data-area="asia">Азия</div>
            <div class="btn" data-area="northAmerica">Северная Америка</div>
            <div class="btn" data-area="latinAmerica">Латинская Америка</div>
            <div class="btn" data-area="oceania">Океания</div>
            <div class="btn" data-area="middleEast">Ближний Восток</div>
            <div class="btn" data-area="sovietUnion">СССР</div>
        </div>
    </div>

    <!-- START -->
    <div class="start" id="start">Начать игру</div>

</div>
<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

// =========================
// STATE
// =========================
let mode = "solo";
let area = "europe";
let rounds = 5;

let timeEnabled = false;
let movesEnabled = false;

let roomController = null;
let redirected = false;

// =========================
// INPUTS
// =========================
const timeInput = document.getElementById("timeInput");
const movesInput = document.getElementById("movesInput");

// =========================
// ELEMENTS
// =========================
const start = document.getElementById("start");
const link = document.getElementById("duelLink");

// =========================
// CONFIG BUILDER
// =========================
function buildConfig() {
  const time = timeEnabled ? Number(timeInput.value) : -1;
  const moves = movesEnabled ? Number(movesInput.value) : -1;

  const config = {
    mode,
    area,
    players: ["p1", "p2"],
    rules: {
      rounds,
      time: Number.isFinite(time) ? time : -1,
      moves: Number.isFinite(moves) ? moves : -1
    }
  };

  console.log("🧪 CONFIG BUILD:", config);

  return config;
}

// =========================
// MODE
// =========================
document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.onclick = async () => {

    mode = btn.dataset.mode;

    document.querySelectorAll("[data-mode]").forEach(x => {
      x.classList.toggle("active", x === btn);
    });

    // RESET SOLO
    if (mode === "solo") {
      roomController = null;
      redirected = false;

      setStartButtonState({
        text: "Начать игру",
        state: "ready"
      });

      link.value = "";
      link.disabled = true;

      return;
    }

    // DUEL INIT
    setStartButtonState({
      text: "Создание комнаты...",
      state: "disabled"
    });

    roomController = new FirebaseRoomController();

    const room = await roomController.createRoom(buildConfig());

    link.value = room.inviteLink;
    link.disabled = false;

    roomController.onRoom((roomState) => {

      if (redirected) return;

      const players = roomState.players;
      const game = roomState.game;

      const guestConnected = players?.guest?.connected;
      const guestReady = players?.guest?.ready;
      const started = game?.started;

      if (guestConnected && !guestReady) {
        setStartButtonState({
          text: "Игрок подключился",
          state: "waiting"
        });
      }

      if (guestReady && !started) {
        setStartButtonState({
          text: "Начать игру",
          state: "ready"
        });
      }

      if (started && !redirected) {
        redirected = true;
        window.location.href =
          `/play.html?room=${roomState.roomId}&role=host`;
      }
    });

    setStartButtonState({
      text: "Ожидание игрока...",
      state: "waiting"
    });
  };
});

// =========================
// START
// =========================
start.onclick = () => {

  const config = buildConfig();

  console.log("🚀 START CONFIG:", config);

  if (mode === "duel") {
    roomController.startGame(config);
    return;
  }

  localStorage.setItem("gameConfig", JSON.stringify(config));
  window.location.href = "/play.html";
};

// =========================
// AREA
// =========================
document.querySelectorAll("[data-area]").forEach(btn => {
  btn.onclick = () => {

    area = btn.dataset.area;

    document.querySelectorAll("[data-area]").forEach(x => {
      x.classList.toggle("active", x === btn);
    });
  };
});

// =========================
// ROUNDS
// =========================
document.querySelectorAll("[data-rounds]").forEach(btn => {
  btn.onclick = () => {

    rounds = +btn.dataset.rounds;

    document.querySelectorAll("[data-rounds]").forEach(x => {
      x.classList.toggle("active", x === btn);
    });
  };
});

// =========================
// TIMER
// =========================
document.getElementById("timeOn").onclick = () => {
  timeEnabled = true;
  timeInput.disabled = false;
document.getElementById("timeOn").classList.add("active");
  document.getElementById("timeOff").classList.remove("active");
};

document.getElementById("timeOff").onclick = () => {
  timeEnabled = false;
  timeInput.disabled = true;

  document.getElementById("timeOff").classList.add("active");
  document.getElementById("timeOn").classList.remove("active");

  timeInput.value = 300;
};

// =========================
// MOVES
// =========================
document.getElementById("movesOn").onclick = () => {
  movesEnabled = true;
  movesInput.disabled = false;

  document.getElementById("movesOn").classList.add("active");
  document.getElementById("movesOff").classList.remove("active");
};

document.getElementById("movesOff").onclick = () => {
  movesEnabled = false;
  movesInput.disabled = true;

  document.getElementById("movesOff").classList.add("active");
  document.getElementById("movesOn").classList.remove("active");

  movesInput.value = 10;
};

// =========================
// BUTTON STATE
// =========================
function setStartButtonState({ text, state }) {
  start.textContent = text;

  start.classList.remove("wait", "disabled");

  if (state === "ready") {
    start.style.pointerEvents = "auto";
    return;
  }

  if (state === "waiting") {
    start.classList.add("wait");
    start.style.pointerEvents = "none";
  }

  if (state === "disabled") {
    start.classList.add("disabled");
    start.style.pointerEvents = "none";
  }
}

// =========================
// DEBUG
// =========================
window.debugConfig = () => buildConfig();

</script>
</body>
</html>
