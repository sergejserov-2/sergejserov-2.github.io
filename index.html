<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Geo Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* =========================
   CONTAINER
========================= */

.box {
    width: 460px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    box-sizing: border-box;
}

h2 {
    margin: 0 0 16px;
    font-size: 20px;
}

/* =========================
   SECTION
========================= */

.section {
    margin-bottom: 16px;
}

.title {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 8px;
}

/* =========================
   ROW (FIXED)
========================= */

.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
}

.row input {
    flex: 1;
    min-width: 160px;
}

/* =========================
   BUTTONS
========================= */

.btn {
    padding: 8px 10px;
    background: #2a2f3a;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: 0.15s;
}

.btn:hover {
    background: #343b4a;
}

.btn.active {
    background: #4ea1ff;
}

/* =========================
   ROUNDS (FIXED DISTRIBUTION)
========================= */

#rounds {
    display: flex;
    width: 100%;
}

#rounds .btn {
    flex: 1;
    text-align: center;
}

/* =========================
   INPUTS
========================= */

input[type="number"],
input[type="text"] {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #2a2f3a;
    color: white;
    outline: none;
}

input:disabled {
    opacity: 0.4;
}

/* =========================
   INLINE CONTROL ROWS
========================= */

.inline {
    display: flex;
    gap: 8px;
    align-items: center;
}

.inline input {
    flex: 1;
}

/* =========================
   MAP (LEFT ALIGN FIX)
========================= */

.map-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-start;
}

.map-row .btn {
    flex: 0 0 auto;
}

/* =========================
   START BUTTON (FIXED)
========================= */

.start {
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    background: #2ecc71;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.start:hover {
    background: #27ae60;
}

.start.wait {
    background: #f39c12;
}
</style>

</head>

<body>

<div class="box">

    <h2>🌍 Geo Game</h2>

    <!-- MODE -->
    <div class="section">
        <div class="title">Режим</div>
        <div class="row">
            <div class="btn active" data-mode="solo">Соло</div>
            <div class="btn" data-mode="duel">Дуэль</div>

            <input id="duelLink" type="text" placeholder="" disabled />
        </div>
    </div>

    <!-- ROUNDS -->
    <div class="section">
        <div class="title">Раунды</div>
        <div class="row" id="rounds">
            <div class="btn" data-rounds="1">1</div>
            <div class="btn" data-rounds="2">2</div>
            <div class="btn" data-rounds="3">3</div>
            <div class="btn" data-rounds="4">4</div>
            <div class="btn active" data-rounds="5">5</div>
        </div>
    </div>

    <!-- TIMER -->
    <div class="section">
        <div class="title">Таймер</div>
        <div class="inline">
            <div class="btn active" id="timeOff">Нет</div>
            <div class="btn" id="timeOn">Установить</div>
            <input id="timeInput" type="number" value="60" disabled>
        </div>
    </div>

    <!-- MOVES -->
    <div class="section">
        <div class="title">Шаги</div>
        <div class="inline">
            <div class="btn active" id="movesOff">Нет</div>
            <div class="btn" id="movesOn">Установить</div>
            <input id="movesInput" type="number" value="10" disabled>
        </div>
    </div>
<!-- MAP -->
    <div class="section">
        <div class="title">Карта</div>
        <div class="map-row" id="areas">
            <div class="btn active" data-area="europe">Европа</div>
            <div class="btn" data-area="asia">Азия</div>
            <div class="btn" data-area="northAmerica">Северная Америка</div>
            <div class="btn" data-area="latinAmerica">Латинская Америка</div>
            <div class="btn" data-area="oceania">Океания</div>
            <div class="btn" data-area="middleEast">Ближний Восток</div>
            <div class="btn" data-area="sovietUnion">СССР</div>
        </div>
    </div>

    <!-- START -->
    <div class="start" id="start">Начать игру</div>

</div>

<script>
let mode = "solo";
let area = "europe";
let rounds = 5;

let timeEnabled = false;
let movesEnabled = false;

// MODE
document.querySelectorAll("[data-mode]").forEach(b => {
    b.onclick = () => {
        document.querySelectorAll("[data-mode]").forEach(x => x.classList.remove("active"));
        b.classList.add("active");

        mode = b.dataset.mode;

        const link = document.getElementById("duelLink");

        if (mode === "duel") {
            link.disabled = false;
            link.placeholder = "Ссылка для приглашения...";
            start.textContent = "Ожидание игрока...";
            start.classList.add("wait");
        } else {
            link.disabled = true;
            link.value = "";
            link.placeholder = "";
            start.textContent = "Начать игру";
            start.classList.remove("wait");
        }
    };
});

// ROUNDS
document.querySelectorAll("[data-rounds]").forEach(b => {
    b.onclick = () => {
        document.querySelectorAll("[data-rounds]").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        rounds = +b.dataset.rounds;
    };
});

// AREA
document.querySelectorAll("[data-area]").forEach(b => {
    b.onclick = () => {
        document.querySelectorAll("[data-area]").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        area = b.dataset.area;
    };
});

// TIMER
const timeInput = document.getElementById("timeInput");
document.getElementById("timeOff").onclick = () => {
    timeEnabled = false;
    timeInput.disabled = true;
};

document.getElementById("timeOn").onclick = () => {
    timeEnabled = true;
    timeInput.disabled = false;
};

// MOVES
const movesInput = document.getElementById("movesInput");
document.getElementById("movesOff").onclick = () => {
    movesEnabled = false;
    movesInput.disabled = true;
};

document.getElementById("movesOn").onclick = () => {
    movesEnabled = true;
    movesInput.disabled = false;
};

// START
document.getElementById("start").onclick = () => {

    const config = {
        mode,
        area,
        rules: {
            rounds,
            time: timeEnabled ? +timeInput.value : -1,
            moves: movesEnabled ? +movesInput.value : -1,
            zoom: true,
            pan: true
        }
    };

    localStorage.setItem("gameConfig", JSON.stringify(config));

    if (mode === "duel") {
        return;
    }

    window.location.href = "/play.html";
};
</script>

</body>
</html>
