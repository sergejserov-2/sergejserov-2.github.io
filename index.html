<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Geo Game</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f1115;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .lobby {
        width: 420px;
        background: #161a22;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 20px;
        margin-bottom: 20px;
    }

    .section {
        margin-bottom: 20px;
    }

    .title {
        font-size: 13px;
        opacity: 0.7;
        margin-bottom: 10px;
    }

    .modes, .areas {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        background: #2a2f3a;
        border: 1px solid transparent;
        user-select: none;
        font-size: 13px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #343b4a;
    }

    .btn.active {
        border: 1px solid #4ea1ff;
        background: #22344d;
    }

    .btn.country {
        border: 1px solid #2ecc71;
    }

    .btn.region {
        border: 1px solid #f1c40f;
    }

    .btn.country.active {
        background: rgba(46, 204, 113, 0.15);
    }

    .btn.region.active {
        background: rgba(241, 196, 15, 0.15);
    }

    .start-btn {
        width: 100%;
        margin-top: 10px;
        background: #4ea1ff;
        color: white;
        text-align: center;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    }

    .start-btn:hover {
        background: #3b8be0;
    }
</style>

</head>

<body>

<div class="lobby">

    <h1>🌍 Geo Game</h1>

    <!-- MODE -->
    <div class="section">
        <div class="title">Режим</div>
        <div class="modes">
            <div class="btn active" data-mode="solo">Соло</div>
            <div class="btn" data-mode="duel">Дуэль</div>
        </div>
    </div>

    <!-- AREA -->
    <div class="section">
        <div class="title">Категория</div>
        <div class="areas">
            <div class="btn country active" data-area="france">🇫🇷 France</div>
            <div class="btn country" data-area="germany">🇩🇪 Germany</div>
            <div class="btn region" data-area="europe">🌍 Europe</div>
            <div class="btn region" data-area="asia">🌏 Asia</div>
        </div>
    </div>

    <!-- START -->
    <div class="start-btn" id="startBtn">Начать игру</div>

</div>

<script>
    let selectedMode = "solo";
    let selectedArea = "france";

    document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedMode = btn.dataset.mode;
        };
    });

    document.querySelectorAll("[data-area]").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll("[data-area]").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedArea = btn.dataset.area;
        };
    });

    document.getElementById("startBtn").onclick = () => {
        console.log("[START GAME]", {
            mode: selectedMode,
            area: selectedArea
        });

        // сюда потом подключим Bridge → Game.startGame(...)
        alert(`Start: ${selectedMode} / ${selectedArea}`);
    };
</script>

</body>
</html>
