<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Geo Game</title>
    
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* =========================
   CONTAINER
========================= */

.box {
    width: 460px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    box-sizing: border-box;
}

h2 {
    margin: 0 0 16px;
    font-size: 20px;
}

/* =========================
   SECTION
========================= */

.section {
    margin-bottom: 16px;
}

.title {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 8px;
}

/* =========================
   ROW
========================= */

.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
}

.row input {
    flex: 1;
    min-width: 160px;
}

/* =========================
   BUTTONS
========================= */

.btn {
    padding: 8px 10px;
    background: #2a2f3a;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: 0.15s;
}

.btn:hover {
    background: #343b4a;
}

.btn.active {
    background: #4ea1ff;
}

/* =========================
   ROUNDS
========================= */

#rounds {
    display: flex;
    width: 100%;
}

#rounds .btn {
    flex: 1;
    text-align: center;
}

/* =========================
   INPUTS
========================= */

input[type="number"],
input[type="text"] {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #2a2f3a;
    color: white;
    outline: none;
}

input:disabled {
    opacity: 0.4;
}

/* =========================
   INLINE
========================= */

.inline {
    display: flex;
    gap: 8px;
    align-items: center;
}

/* =========================
   MAP ROW
========================= */

.map-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

/* =========================
   START BUTTON
========================= */

.start {
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    background: #2ecc71;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.start:hover {
    background: #27ae60;
}

.start.wait {
    background: #f39c12;
    cursor: not-allowed;
}

.start.disabled {
    background: #555;
    cursor: not-allowed;
}
</style>

</head>

<body>

<div class="box">

    <h2>🌍 Geo Game</h2>

    <!-- MODE -->
    <div class="section">
        <div class="title">Режим</div>
        <div class="row">
            <div class="btn active" data-mode="solo">Соло</div>
            <div class="btn" data-mode="duel">Дуэль</div>

            <input id="duelLink" type="text" placeholder="" disabled />
        </div>
    </div>

    <!-- ROUNDS -->
    <div class="section">
        <div class="title">Раунды</div>
        <div class="row" id="rounds">
            <div class="btn" data-rounds="1">1</div>
            <div class="btn" data-rounds="2">2</div>
            <div class="btn" data-rounds="3">3</div>
            <div class="btn" data-rounds="4">4</div>
            <div class="btn active" data-rounds="5">5</div>
        </div>
    </div>

    <!-- TIMER -->
    <div class="section">
        <div class="title">Таймер</div>
        <div class="inline">
            <div class="btn active" id="timeOff">Нет</div>
            <div class="btn" id="timeOn">Установить</div>
            <input id="timeInput" type="number" value="300" disabled>
        </div>
    </div>

    <!-- MOVES -->
    <div class="section">
        <div class="title">Ходы</div>
        <div class="inline">
            <div class="btn active" id="movesOff">Нет</div>
            <div class="btn" id="movesOn">Установить</div>
            <input id="movesInput" type="number" value="10" disabled>
        </div>
    </div>
<!-- AREA -->
    <div class="section">
        <div class="title">Карта</div>
        <div class="map-row" id="areas">
            <div class="btn active" data-area="europe">Европа</div>
            <div class="btn" data-area="asia">Азия</div>
            <div class="btn" data-area="northAmerica">Северная Америка</div>
            <div class="btn" data-area="latinAmerica">Латинская Америка</div>
            <div class="btn" data-area="oceania">Океания</div>
            <div class="btn" data-area="middleEast">Ближний Восток</div>
            <div class="btn" data-area="sovietUnion">СССР</div>
        </div>
    </div>

    <!-- START -->
    <div class="start" id="start">Начать игру</div>

</div>
<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

let mode = "solo";
let area = "europe";
let rounds = 5;

let timeEnabled = false;
let movesEnabled = false;

let roomController = null;

// =========================
// BUILD CONFIG
// =========================
function buildConfig() {
 return {
  mode,
  area,
  rules: {
   rounds,
   time: timeEnabled ? +document.getElementById("timeInput").value : -1,
   moves: movesEnabled ? +document.getElementById("movesInput").value : -1
  }
 };
}

// =========================
// ELEMENTS
// =========================
const link = document.getElementById("duelLink");
const start = document.getElementById("start");

// =========================
// MODE SWITCH
// =========================
document.querySelectorAll("[data-mode]").forEach(b => {
 b.onclick = async () => {

  document.querySelectorAll("[data-mode]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");

  mode = b.dataset.mode;

  // =========================
  // SOLO
  // =========================
  if (mode === "solo") {

   if (roomController) {
    roomController = null;
   }

   link.value = "";
   link.disabled = true;

   start.textContent = "Начать игру";
   start.classList.remove("wait");

   return;
  }

  // =========================
  // DUEL
  // =========================
  start.textContent = "Создание комнаты...";
  start.classList.add("wait");

  roomController = new FirebaseRoomController();

  const room = await roomController.createRoom(buildConfig());

  link.value = room.inviteLink;
  link.disabled = false;

  // LIVE CONFIG SYNC (ВАЖНО)
  roomController.onDraftConfig((cfg) => {
   // если надо — сюда потом можно привязать UI отображение в лобби
   console.log("draftConfig:", cfg);
  });

roomController.onState((state) => {
 if (state.guestReady) {
  start.textContent = "START GAME";
  start.classList.remove("wait");
 }
});

  roomController.onStart(() => {
   window.location.href = `/play.html?room=${room.roomId}&role=host`;
  });

  start.textContent = "Ожидание игрока...";
 };
});

// =========================
// SYNC ROOM CONFIG
// =========================
function syncRoom() {
 if (mode !== "duel" || !roomController) return;

 roomController.setDraftConfig(buildConfig());
}

// =========================
// ROUNDS
// =========================
document.querySelectorAll("[data-rounds]").forEach(b => {
 b.onclick = () => {
  document.querySelectorAll("[data-rounds]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");

  rounds = +b.dataset.rounds;
  syncRoom();
 };
});

// =========================
// AREA
// =========================
document.querySelectorAll("[data-area]").forEach(b => {
 b.onclick = () => {
  document.querySelectorAll("[data-area]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");

  area = b.dataset.area;
  syncRoom();
 };
});

// =========================
// TIMER / MOVES FIX (ВАЖНО)
// =========================
const timeOff = document.getElementById("timeOff");
const timeOn = document.getElementById("timeOn");
const timeInput = document.getElementById("timeInput");

timeOff.onclick = () => {
 timeOff.classList.add("active");
 timeOn.classList.remove("active");
 timeInput.disabled = true;
 timeEnabled = false;
 syncRoom();
};

timeOn.onclick = () => {
 timeOn.classList.add("active");
 timeOff.classList.remove("active");
 timeInput.disabled = false;
 timeEnabled = true;
 syncRoom();
};

timeInput.oninput = syncRoom;

// MOVES
const movesOff = document.getElementById("movesOff");
const movesOn = document.getElementById("movesOn");
const movesInput = document.getElementById("movesInput");

movesOff.onclick = () => {
 movesOff.classList.add("active");
 movesOn.classList.remove("active");
 movesInput.disabled = true;
 movesEnabled = false;
 syncRoom();
};

movesOn.onclick = () => {
 movesOn.classList.add("active");
 movesOff.classList.remove("active");
 movesInput.disabled = false;
 movesEnabled = true;
 syncRoom();
};

movesInput.oninput = syncRoom;
// =========================
// START
// =========================
start.onclick = () => {

 if (mode === "duel") {
  if (!roomController) return;

  roomController.lockConfigAndStart();
  return;
 }

 localStorage.setItem("gameConfig", JSON.stringify(buildConfig()));
 window.location.href = "/play.html";
};

</script>
</body>
</html>
