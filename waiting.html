<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waiting Room</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 520px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    margin: 0 0 12px;
}

.role {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
}

.config {
    background: #0f1115;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: pre-wrap;
    margin-bottom: 16px;
}

.btn {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    user-select: none;
    box-sizing: border-box; /* 🔥 фикс ширины */
}

/* зелёная — можно нажать */
.btn.ready {
    background: #2ecc71;
}

/* жёлтая — уже нажато */
.btn.wait {
    background: #f39c12;
    cursor: not-allowed;
}

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="box">

    <h2>⏳ Комната ожидания</h2>

    <div class="role">Правила игры</div>

    <div class="config" id="config">Загрузка...</div>

    <div class="btn" id="btn"></div>

    <div class="status" id="status">Ожидание хоста...</div>

</div>

<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

const url = new URL(window.location.href);
const roomId = url.searchParams.get("room");

const btn = document.getElementById("btn");
const status = document.getElementById("status");

const room = new FirebaseRoomController();

let redirected = false;

// =========================
// BUTTON STATE
// =========================
function updateButton(isReady) {
  if (isReady) {
    btn.textContent = "Вы уже подключились";
    btn.classList.remove("ready");
    btn.classList.add("wait");
    btn.style.pointerEvents = "none";
  } else {
    btn.textContent = "Подключиться";
    btn.classList.add("ready");
    btn.classList.remove("wait");
    btn.style.pointerEvents = "auto";
  }
}

// =========================
// JOIN
// =========================
const state = await room.joinRoom(roomId);

// initial button state
updateButton(state?.players?.guest?.ready);

// instant redirect
if (state?.game?.started) {
 window.location.href =
 `/play.html?room=${roomId}&role=guest`;
}

// =========================
// STATE STREAM
// =========================
room.onRoom((state) => {

 if (redirected) return;

 const game = state.game;
 const players = state.players;

 const isReady = players?.guest?.ready;

 // sync button
 updateButton(isReady);

 // =========================
 // AUTO START
 // =========================
 if (game?.started) {
  redirected = true;

  window.location.href =
   `/play.html?room=${roomId}&role=guest`;
 }

 // =========================
 // UI STATUS
 // =========================
 if (players?.guest?.connected && !isReady) {
  status.textContent = "Подключитесь, чтобы начать";
 }

 if (isReady && !game?.started) {
  status.textContent = "Ожидание начала игры...";
 }
});

// =========================
// READY BUTTON
// =========================
btn.onclick = async () => {
  if (btn.classList.contains("wait")) return;

  await room.setGuestReady();
};
</script>

</body>
</html>
