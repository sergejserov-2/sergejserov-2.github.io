<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waiting Room</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* =========================
   BOX
========================= */

.box {
    width: 520px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   TITLE
========================= */

h2 {
    margin: 0 0 12px;
}

/* =========================
   ROLE
========================= */

.role {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
}

/* =========================
   CONFIG DEBUG
========================= */

.config {
    background: #0f1115;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: pre-wrap;
    margin-bottom: 16px;
    opacity: 0.9;
}

/* =========================
   BUTTON
========================= */

.btn {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: #2ecc71;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    user-select: none;
}

.btn:hover {
    background: #27ae60;
}

.btn:disabled {
    background: #555;
    cursor: not-allowed;
}

.btn.wait {
    background: #f39c12;
}

/* =========================
   STATUS
========================= */

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}

</style>

</head>

<body>

<div class="box">

    <h2>⏳ Waiting Room</h2>

    <div class="role" id="role">guest</div>

    <div class="config" id="config">Loading config...</div>

    <div class="btn" id="actionBtn">READY</div>

    <div class="status" id="info">Click when ready</div>

</div>

<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

// =========================
// URL
// =========================
const url = new URL(window.location.href);

const roomId = url.searchParams.get("room");
const role = (url.searchParams.get("role") || "guest")
 .trim()
 .toLowerCase();

// =========================
// UI
// =========================
const roleEl = document.getElementById("role");
const configEl = document.getElementById("config");
const btn = document.getElementById("actionBtn");
const info = document.getElementById("info");

roleEl.textContent = "guest";

// =========================
// ROOM
// =========================
const room = new FirebaseRoomController();

await room.joinRoom(roomId);

// =========================
// STATE
// =========================
let guestReady = false;

// =========================
// CONFIG SYNC
// =========================
room.onDraftConfig((draft) => {
 configEl.textContent = JSON.stringify(draft, null, 2);
});

// =========================
// GAME START → REDIRECT
// =========================
room.onStart(() => {
 console.log("🔥 GAME START → GO PLAY");

 window.location.href =
  `/play.html?room=${roomId}&role=guest`;
});

// =========================
// UI RENDER
// =========================
function render() {
 if (!guestReady) {
  btn.disabled = false;
  btn.textContent = "READY";
  info.textContent = "Click when ready";
 } else {
  btn.disabled = true;
  btn.textContent = "WAITING HOST...";
  info.textContent = "Waiting for host to start...";
 }
}

render();

// =========================
// READY CLICK
// =========================
btn.onclick = async () => {
 if (guestReady) return;

 console.log("🟢 GUEST READY");

 guestReady = true;
 render();

 await room.setGuestReady();
};

</script>

</body>
</html>
