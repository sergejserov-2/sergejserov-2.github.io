<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waiting Room</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 520px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    margin: 0 0 12px;
}

.role {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
}

.config {
    background: #0f1115;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: pre-wrap;
    margin-bottom: 16px;
}

.btn {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: #2ecc71;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn:disabled {
    background: #555;
    cursor: not-allowed;
}

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="box">

    <h2>⏳ Waiting Room</h2>

    <div class="role">guest</div>

    <div class="config" id="config">Loading...</div>

    <div class="btn" id="btn">READY</div>

    <div class="status" id="status">Click when ready</div>

</div>

<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

// =========================
// URL
// =========================
const url = new URL(window.location.href);

const roomId = url.searchParams.get("room");
const role = (url.searchParams.get("role") || "guest");

// =========================
// UI
// =========================
const configEl = document.getElementById("config");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

// =========================
// ROOM
// =========================
const room = new FirebaseRoomController();

await room.joinRoom(roomId);

// =========================
// STATE
// =========================
let guestReady = false;
let gameStarted = false;

// =========================
// CONFIG LIVE
// =========================
room.onDraftConfig((cfg) => {
 configEl.textContent = JSON.stringify(cfg, null, 2);
});

// =========================
// PLAYER STATE LISTENER (🔥 ВАЖНО)
// =========================
// ожидаем что в bind() ты уже эмитишь players state
room.onPlayers?.((players) => {

 console.log("👀 PLAYERS UPDATE:", players);

 if (players?.guest?.ready) {
  guestReady = true;
  btn.disabled = true;
  btn.textContent = "WAITING HOST...";
  status.textContent = "Guest ready ✔️";
 }

const snap = await room.joinRoom(roomId);

if (snap?.players?.game?.started) {
 window.location.href =
  `/play.html?room=${roomId}&role=guest`;
}
});

// =========================
// READY CLICK
// =========================
btn.onclick = async () => {
 if (guestReady) return;

 console.log("🟢 SET GUEST READY");

 guestReady = true;

 btn.disabled = true;
 btn.textContent = "WAITING HOST...";
 status.textContent = "Waiting for host...";

 await room.setGuestReady();
};

</script>

</body>
</html>
