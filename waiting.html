<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

// =========================
// URL
// =========================
const url = new URL(window.location.href);
const roomId = url.searchParams.get("room");
const role = url.searchParams.get("role");

// =========================
// UI
// =========================
const roleEl = document.getElementById("role");
const configEl = document.getElementById("config");
const btn = document.getElementById("actionBtn");
const info = document.getElementById("info");

roleEl.textContent = role;

// =========================
// ROOM
// =========================
const room = new FirebaseRoomController();

await room.joinRoom(roomId);

// =========================
// CONFIG SYNC
// =========================
room.onConfig((config) => {
 configEl.textContent = JSON.stringify(config, null, 2);
});

// =========================
// STATE MACHINE EVENTS
// =========================
room.onStateChange((state) => {

 if (state.guestReady) {
  info.textContent = "Player ready";
 }

 if (state.started) {
  window.location.href = `/play.html?room=${roomId}`;
 }
});

// =========================
// HOST
// =========================
if (role === "host") {

 btn.textContent = "START GAME";
 btn.classList.add("disabled");

 room.onStateChange((state) => {
  btn.classList.toggle("disabled", !state.guestReady);
 });

 btn.onclick = () => {
  room.startGame();
 };
}

// =========================
// GUEST
// =========================
if (role === "guest") {

 btn.textContent = "READY";

 btn.onclick = () => {
  room.setGuestReady();
  btn.textContent = "WAITING HOST...";
  btn.classList.add("active");
 };
}
</script>
