<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waiting Room</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 520px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    margin: 0 0 12px;
}

.role {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
}

.config {
    background: #0f1115;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: pre-wrap;
    margin-bottom: 16px;
}

.btn {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: #2ecc71;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    user-select: none;
}

.btn:disabled {
    background: #555;
    cursor: not-allowed;
}

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="box">

    <h2>⏳ Waiting Room</h2>

    <div class="role">guest</div>

    <div class="config" id="config">Loading...</div>

    <div class="btn" id="btn">READY</div>

    <div class="status" id="status">Waiting for host...</div>

</div>
<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

const url = new URL(window.location.href);
const roomId = url.searchParams.get("room");

const btn = document.getElementById("btn");

const room = new FirebaseRoomController();

let redirected = false;

const snapshot = await room.joinRoom(roomId);

// snapshot check
if (snapshot?.game?.started) {
 window.location.href =
 `/play.html?room=${roomId}&role=guest`;
}

// live
room.onPlayers((players) => {

 if (redirected) return;

 if (players?.game?.started) {
  redirected = true;

  window.location.href =
   `/play.html?room=${roomId}&role=guest`;
 }
});

// READY
btn.onclick = async () => {
 btn.disabled = true;
 await room.setGuestReady();
};
</script>

</body>
</html>
