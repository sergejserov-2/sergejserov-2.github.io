<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waiting Room</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* =========================
   BOX
========================= */

.box {
    width: 520px;
    background: #161a22;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   HEADER
========================= */

h2 {
    margin: 0 0 12px;
}

/* =========================
   ROLE
========================= */

.role {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
}

/* =========================
   CONFIG
========================= */

.config {
    background: #0f1115;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: pre-wrap;
    margin-bottom: 16px;
}

/* =========================
   BUTTON
========================= */

.btn {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: #2ecc71;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn:hover {
    background: #27ae60;
}

.btn.disabled {
    background: #555;
    cursor: not-allowed;
}

.btn.wait {
    background: #f39c12;
}

/* =========================
   STATUS
========================= */

.status {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="box">

    <h2>⏳ Waiting Room</h2>

    <div class="role" id="role">Role: ...</div>

    <div class="config" id="config">Loading config...</div>

    <div class="btn disabled" id="actionBtn">...</div>

    <div class="status" id="info"></div>

</div>

<script type="module">
import { FirebaseRoomController } from "./server/FirebaseRoomController.js";

// =========================
// URL
// =========================
const url = new URL(window.location.href);
const roomId = url.searchParams.get("room");
const role = url.searchParams.get("role");

// =========================
// UI
// =========================
const roleEl = document.getElementById("role");
const configEl = document.getElementById("config");
const btn = document.getElementById("actionBtn");
const info = document.getElementById("info");

roleEl.textContent = role;

// =========================
// ROOM
// =========================
const room = new FirebaseRoomController();

await room.joinRoom(roomId);

// =========================
// LIVE CONFIG (ВАЖНО: DRAFT)
// =========================
room.onDraftConfig((draft) => {
 configEl.textContent = JSON.stringify(draft, null, 2);
});

// =========================
// START SIGNAL
// =========================
room.onStart(() => {
 window.location.href = `/play.html?room=${roomId}&role=guest`;
});

// =========================
// HOST VIEW
// =========================
if (role === "host") {

 btn.textContent = "START GAME";
 btn.disabled = true;

 room.onGuestReady(() => {
  btn.disabled = false;
  info.textContent = "Player ready ✔️";
 });

 btn.onclick = () => {
  room.lockConfigAndStart();
 };
}

// =========================
// GUEST VIEW
// =========================
if (role === "guest") {

 btn.textContent = "READY";

 btn.onclick = () => {
  room.setGuestReady();
  btn.disabled = true;
  btn.textContent = "WAITING HOST...";
 };
}
</script>

</body>
</html>
